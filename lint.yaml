commands:
  - name: "Go formatting check"
    cmd: "sh"
    args:
      - "-c"
      - "test -z \"$(gofmt -l .)\""

  - name: "Go tests (proxmox-cli)"
    cmd: "sh"
    args:
      - "-c"
      - "cd applications/proxmox-cli/src && go test ./..."

  - name: "Go tests (aria2-cli)"
    cmd: "sh"
    args:
      - "-c"
      - "cd applications/aria2-cli/src && go test ./..."

  - name: "Go tests (image-gen-cli)"
    cmd: "sh"
    args:
      - "-c"
      - "cd applications/image-gen-cli/src && go test ./..."

include:
  - "*.go"

exclude:
  - "**/vendor/**"
  - "**/build/**"
  - "**/dist/**"

max_lines_by_ext:
  .go: 250
